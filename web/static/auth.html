<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShellGate - Login</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #1a1b26;
            color: #a9b1d6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 24px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            color: #c0caf5;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: #565f89;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #565f89;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #24283b;
            border: 1px solid #414868;
            border-radius: 8px;
            color: #c0caf5;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #7aa2f7;
        }

        .form-group input::placeholder {
            color: #414868;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #7aa2f7;
            color: #1a1b26;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #89b4fa;
        }

        .submit-btn:active {
            background: #6a92e7;
        }

        .error-msg {
            display: none;
            text-align: center;
            color: #f7768e;
            font-size: 13px;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(247, 118, 142, 0.1);
            border-radius: 6px;
        }

        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>ShellGate</h1>
            <p>Authenticate to access the terminal</p>
        </div>

        <div class="error-msg" id="error-msg">Invalid credentials. Please try again.</div>

        <form method="POST" action="/auth/login" id="login-form">
            <div class="form-group" id="password-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" autofocus>
            </div>

            <div class="form-group" id="otp-group" style="display:none;">
                <label for="code">One-Time Code</label>
                <input type="text" id="code" name="code" placeholder="000000" autocomplete="one-time-code"
                       inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autofocus>
            </div>

            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('error')) {
                document.getElementById('error-msg').classList.add('visible');
            }

            // Auto-detect auth mode from page context
            if (params.get('mode') === 'otp') {
                document.getElementById('password-group').style.display = 'none';
                document.getElementById('otp-group').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
